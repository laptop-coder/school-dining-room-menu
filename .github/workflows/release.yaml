name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Install semantic-release tools
        run: |
          npm install -g \
          @semantic-release/commit-analyzer \
          @semantic-release/release-notes-generator \
          @semantic-release/github \
          semantic-release
      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --branches main --plugins "@semantic-release/commit-analyzer,@semantic-release/release-notes-generator,@semantic-release/github"
          VERSION=$(git describe --tags --abbrev=0)
          echo "release_version=$VERSION" >> $GITHUB_OUTPUT
  push-backend:
    name: Push backend
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    if: needs.release.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/school-dining-room-menu-backend:latest
            ghcr.io/${{ github.repository_owner }}/school-dining-room-menu-backend:${{ needs.release.outputs.version }}
  push-frontend:
    name: Push frontend
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    if: needs.release.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/school-dining-room-menu-frontend:latest
            ghcr.io/${{ github.repository_owner }}/school-dining-room-menu-frontend:${{ needs.release.outputs.version }}
  push-docs:
    name: Push docs
    needs: release
    runs-on: ubuntu-latest
    permissions:
      packages: write
    if: needs.release.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push docs
        uses: docker/build-push-action@v7
        with:
          context: ./docs
          file: ./docs/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/school-dining-room-menu-docs:latest
            ghcr.io/${{ github.repository_owner }}/school-dining-room-menu-docs:${{ needs.release.outputs.version }}
